<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="peak" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Mountain peak -->
  <polygon points="32,10 14,46 50,46" fill="url(#peak)" opacity="0.9" filter="url(#glow)"/>
  <!-- Inner lighter peak -->
  <polygon points="32,16 22,40 42,40" fill="white" opacity="0.08"/>
  <!-- Neural nodes -->
  <circle cx="32" cy="10" r="2.5" fill="#14b8a6" opacity="0.95"/>
  <circle cx="14" cy="46" r="2" fill="#a855f7" opacity="0.9"/>
  <circle cx="50" cy="46" r="2" fill="#a855f7" opacity="0.9"/>
  <circle cx="26" cy="30" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="40" cy="26" r="1.5" fill="white" opacity="0.6"/>
  <!-- Connection lines -->
  <line x1="32" y1="10" x2="26" y2="30" stroke="white" stroke-width="0.6" opacity="0.35"/>
  <line x1="32" y1="10" x2="40" y2="26" stroke="white" stroke-width="0.6" opacity="0.35"/>
  <line x1="26" y1="30" x2="14" y2="46" stroke="white" stroke-width="0.6" opacity="0.35"/>
  <line x1="40" y1="26" x2="50" y2="46" stroke="white" stroke-width="0.6" opacity="0.35"/>
  <line x1="26" y1="30" x2="40" y2="26" stroke="white" stroke-width="0.6" opacity="0.35"/>
</svg>
